name: Translate and Update Release Notes

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "What's New text (in English)"
        required: true
        type: string
      platform:
        description: "Target platform"
        required: true
        type: choice
        default: 'ios'
        options:
          - ios
          - tvos

jobs:
  translate-and-update:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.5'
          bundler-cache: true

      - name: Write English release notes
        run: |
          if [ "${{ inputs.platform }}" = "tvos" ]; then
            mkdir -p fastlane/metadata/tvos/en-US
            echo "${{ inputs.release_notes }}" > fastlane/metadata/tvos/en-US/release_notes.txt
            cat fastlane/metadata/tvos/en-US/release_notes.txt
          else
            mkdir -p fastlane/metadata/ios/en-US
            echo "${{ inputs.release_notes }}" > fastlane/metadata/ios/en-US/release_notes.txt
            cat fastlane/metadata/ios/en-US/release_notes.txt
          fi

      - name: Translate release notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bundle exec fastlane translate_release_notes platform:${{ inputs.platform }}

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          bundle exec fastlane update_release_notes platform:${{ inputs.platform }}
