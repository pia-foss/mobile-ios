strings:
    inputs:
        - LocalPackages/PIALocalizations/Sources/PIALocalizations/Resources/en.lproj/Localizable.strings
    outputs:
        templateName: structured-swift5
        output: LocalPackages/PIALocalizations/Sources/PIALocalizations/Generated/L10n.swift
        params:
            publicAccess: true

ib:
    inputs:
        - PIA VPN/UI/Storyboards/en.lproj/Main.storyboard
        - PIA VPN/UI/Storyboards/Welcome.storyboard
        - PIA VPN/UI/Storyboards/Signup.storyboard
    outputs:
        templateName: scenes-swift5
        output: PIA VPN/UI/Shared/SwiftGen+ScenesStoryboards.swift
    outputs.params:
        module: PIA_VPN

xcassets:
  - inputs:
        - LocalPackages/PIAAssets/Sources/PIAAssetsMobile/Resources/Images.xcassets
        - LocalPackages/PIAAssets/Sources/PIAAssetsMobile/Resources/UI.xcassets
    outputs:
        templatePath: Resources/SwiftGen/xcassets/swift5.stencil
        output: LocalPackages/PIAAssets/Sources/PIAAssetsMobile/Generated/Asset.swift
        params:
            publicAccess: true
  - inputs:
        - LocalPackages/PIAAssets/Sources/PIAAssetsTV/Resources/Assets.xcassets
    outputs:
        templatePath: Resources/SwiftGen/xcassets/swift5.stencil
        output: LocalPackages/PIAAssets/Sources/PIAAssetsTV/Generated/Asset.swift
        params:
            publicAccess: true
  - inputs:
        - LocalPackages/PIAAssets/Sources/PIAAssetsWidget/Resources/Assets.xcassets
    outputs:
        templatePath: Resources/SwiftGen/xcassets/swift5.stencil
        output: LocalPackages/PIAAssets/Sources/PIAAssetsWidget/Generated/Asset.swift
        params:
            publicAccess: true
